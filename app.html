<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/src/app.css">
  <title>Fight Money Dashboard</title>
</head>

<body>

  <header>
    <h1>💰 Fight Money</h1>
    <p>家族で楽しくおこづかい管理</p>
  </header>

  <div class="container">

    <div class="cards">

      <div class="card">
        <h2>今月のおこづかい</h2>
        <div class="money">¥3,500</div>
      </div>

      <div class="card">
        <h2>お手伝い回数</h2>
        <div class="count">18回</div>
      </div>

    </div>

    <div class="chart-box">
      <h2>📊 お手伝い回数</h2>

      <canvas id="myChart"></canvas>

    </div>

  </div>

  <script type="module" src="/src/app.js"></script>

</body>

</html>
